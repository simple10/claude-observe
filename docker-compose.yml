services:
  claude-observe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-observe
    environment:
      CLAUDE_OBSERVE_SERVER_PORT: "${CLAUDE_OBSERVE_SERVER_PORT:-4981}"
      CLAUDE_OBSERVE_DB_PATH: /data/observe.db
      CLAUDE_OBSERVE_CLIENT_DIST_PATH: /app/client/dist
      CLAUDE_OBSERVE_LOG_LEVEL: "${CLAUDE_OBSERVE_LOG_LEVEL:-debug}"
    ports:
      - "${CLAUDE_OBSERVE_SERVER_PORT:-4981}:${CLAUDE_OBSERVE_SERVER_PORT:-4981}"
    volumes:
      - ${CLAUDE_OBSERVE_DATA_DIR:-./data}:/data
